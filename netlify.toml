[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/auth/password-reset"
  to = "/.netlify/functions/auth-password-reset"
  status = 200

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/support-feedback"
  to = "/.netlify/functions/support-feedback"
  status = 200

[[redirects]]
  from = "/api/ai/teacher-assistant"
  to = "/.netlify/functions/teacher-ai"
  status = 200

[[redirects]]
  from = "/api/account/delete"
  to = "/.netlify/functions/account-delete"
  status = 200

[[redirects]]
  from = "/api/payment/create-intent"
  to = "/.netlify/functions/payment-create-intent"
  status = 200

[[redirects]]
  from = "/api/payment/process"
  to = "/.netlify/functions/payment-process"
  status = 200

[[redirects]]
  from = "/api/payment/send-vipps-request"
  to = "/.netlify/functions/payment-send-vipps-request"
  status = 200

[[redirects]]
  from = "/api/student/payment-requests"
  to = "/.netlify/functions/student-payment-requests"
  status = 200

[[redirects]]
  from = "/api/payment/create-checkout-session"
  to = "/.netlify/functions/payment-create-checkout-session"
  status = 200

[[redirects]]
  from = "/api/send-report"
  to = "/.netlify/functions/send-report"
  status = 200

[[redirects]]
  from = "/api/invitations/send-email"
  to = "/.netlify/functions/invitations-send-email"
  status = 200

[[redirects]]
  from = "/api/invitations/validate"
  to = "/.netlify/functions/invitations-validate"
  status = 200

[[redirects]]
  from = "/api/students/existing/check"
  to = "/.netlify/functions/students-existing-check"
  status = 200

[[redirects]]
  from = "/api/students/existing/link"
  to = "/.netlify/functions/students-existing-link"
  status = 200

[[redirects]]
  from = "/create-checkout-session"
  to = "/.netlify/functions/payment-create-checkout-session"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
